[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  included_files = ["netlify/functions/**"]

[functions."gemini-proxy"]
  timeout = 60


[dev]
  framework = "vite"
  autoLaunch = false

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
